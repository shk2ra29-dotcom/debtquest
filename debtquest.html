                case 3: renderVisionTab(); break;
                case 4: renderSettingsTab(); break;
            }

        function formatAmount(num) {
            return new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' }).format(num);
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('ja-JP').format(num);
        }

        function getTodayDate() {
            const d = new Date();
            return d.toISOString().split('T')[0];
        }

        function getTotalRepaid() {
            return state.entries
                .filter(e => e.type === 'repay')
                .reduce((sum, e) => sum + e.amount, 0);
        }

        function getTotalInvested() {
            return state.entries
                .filter(e => e.type === 'invest')
                .reduce((sum, e) => sum + e.amount, 0);
        }

        function getCurrentDebt() {
            const balances = Object.values(state.balances).map(b => parseInt(b) || 0);
            return balances.reduce((a, b) => a + b, 0);
        }

        function getRecordCount() {
            return state.entries.length;
        }

        function calculateStreak() {
            if (!state.steps.history || state.steps.history.length === 0) return 0;
            let streak = 0;
            const today = new Date();
            for (let i = 0; i < 365; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                const found = state.steps.history.find(h => h.date === dateStr);
                if (!found) break;
                streak++;
            }
            return streak;
        }

        function updateStreak() {
            state.steps.streak = calculateStreak();
            saveState();
            updateHeaderStreak();
        }

            const streak = calculateStreak();

        function calculateSteps() {
            const stepsInput = document.getElementById('stepsInput');
            const steps = parseInt(stepsInput.value) || 0;
            if (steps <= 0) {
                showToast('忙颅漏忙聲掳茫聜聮氓聟楼氓聤聸茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞', 'error');
                return;
            }

            const total = Math.round(steps * 0.1);
            let debt, save, tier;

            if (steps < 8000) {
                debt = total;
                save = 0;
                tier = '氓聢聺莽麓職';
            } else if (steps < 10000) {
                debt = Math.round(total * 0.7);
                save = total - debt;
                tier = '盲赂颅莽麓職';
            } else {
                debt = Math.round(total * 0.5);
                save = total - debt;
                tier = '盲赂聤莽麓職';
            }

            let html = `
                <div class="card">
                    <div class="step-result">
                        <div class="step-result-title">${tier}冒聼聨炉 ${steps}忙颅漏</div>

                            </div>

                                <div class="breakdown-value">${formatNumber(save)}氓聠聠</div>
                            </div>

                    <button class="button button-secondary" onclick="completeQuest(${steps}, ${total}, ${debt}, ${save})">茫聜炉茫聜篓茫聜鹿茫聝聢氓庐聦盲潞聠茂录聛</button>
                </div>
            `;
            document.getElementById('stepsResult').innerHTML = html;
        }

        function completeQuest(steps, total, debt, save) {
            const today = getTodayDate();
            const now = new Date().toISOString();

            const repayId = Date.now();
            state.entries.push({
                id: repayId,
                date: now,
                amount: debt,
                memo: `忙颅漏忙聲掳: ${steps}忙颅漏 猫驴聰忙赂聢`,
                type: 'repay',
                loanId: 'smbc',
                source: 'steps'
            });

            if (save > 0) {
                const investId = Date.now() + 1;
                state.entries.push({
                    id: investId,
                    date: now,
                    amount: save,
                    memo: `忙颅漏忙聲掳: ${steps}忙颅漏 莽漏聧莽芦聥`,
                    type: 'invest',
                    loanId: '',
                    source: 'steps'
                });
            }

            const existing = state.steps.history.find(h => h.date === today);
            if (existing) {
                existing.steps = steps;
                existing.total = total;
                existing.debt = debt;
                existing.save = save;
            } else {
                state.steps.history.push({
                    date: today,
                    steps,
                    total,
                    debt,
                    save
                });
            }

            state.steps.lastEntryDate = today;
            saveState();
            updateStreak();
            showToast('茫聜炉茫聜篓茫聜鹿茫聝聢氓庐聦盲潞聠茂录聛冒聼聮陋', 'success');

            const card = event.target.closest('.card');
            if (card) card.classList.add('flash');
            setTimeout(() => {
                renderStepsTab();
            }, 600);
        }

                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-line-solid"></div>
                        <span>氓庐聼莽赂戮</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-line-dashed"></div>
                        <span>茫聜路茫聝聼茫聝楼茫聝卢茫聝录茫聜路茫聝搂茫聝鲁</span>
                    </div>
                </div>
            `;

            document.getElementById('visionContent').innerHTML = html;
        }

        function renderSimLine() {
            let path = `M 30 ${170 - (SIM[0].d / 6000000) * 160}`;
            for (let i = 1; i < SIM.length; i++) {
                const x = 30 + (i / SIM.length) * 360;
                const y = 170 - (SIM[i].d / 6000000) * 160;
                path += ` L ${x} ${y}`;
            }
            return `<path d="${path}" stroke="#A78BFA" stroke-width="2" fill="none" stroke-dasharray="4,4"/>`;
        }

        function renderActualLine() {
            const currentDebt = getCurrentDebt();
            let points = [[30, 170 - (INITIAL_DEBT / 6000000) * 160]];

            const sortedEntries = state.entries.filter(e => e.type === 'repay').sort((a, b) => new Date(a.date) - new Date(b.date));

            if (sortedEntries.length > 0) {
                let repaidTotal = 0;
                const uniqueDates = [...new Set(sortedEntries.map(e => e.date.split('T')[0]))];

                uniqueDates.forEach((date, idx) => {
                    const dayRepaid = sortedEntries
                        .filter(e => e.date.startsWith(date))
                        .reduce((sum, e) => sum + e.amount, 0);
                    repaidTotal += dayRepaid;

                    const remaining = INITIAL_DEBT - repaidTotal;
                    const x = 30 + ((idx + 1) / Math.max(uniqueDates.length, 1)) * 360;
                    const y = 170 - Math.max(0, remaining / 6000000) * 160;
                    points.push([x, y]);
                });
            }

            let path = `M ${points[0][0]} ${points[0][1]}`;
            for (let i = 1; i < points.length; i++) {
                path += ` L ${points[i][0]} ${points[i][1]}`;
            }
            return `<path d="${path}" stroke="#00D4AA" stroke-width="2" fill="none"/>`;
        }

        function renderSavingsChart() {
            const invested = getTotalInvested();
            const goal = state.settings.savingsGoal;
            const percent = Math.min(100, (invested / goal) * 100);
            const barWidth = 30;
            const barHeight = percent * 0.8;

            return `
                <rect x="50" y="${100 - barHeight}" width="${barWidth}" height="${barHeight}" fill="#00D4AA" rx="2"/>
                <text x="${50 + barWidth / 2}" y="110" font-size="10" fill="#6B7280" text-anchor="middle">${Math.round(percent)}%</text>
                <text x="${50 + barWidth / 2}" y="20" font-size="9" fill="#6B7280" text-anchor="middle">${formatNumber(invested)}氓聠聠</text>
            `;
        }

        function renderSettingsTab() {
            let html = `
                <div class="card">
                    <div class="input-label">茫聝颅茫聝录茫聝鲁忙庐聥茅芦聵猫篓颅氓庐職</div>
            `;

            LOANS.forEach(loan => {
                const balance = state.balances[loan.id] || '0';
                html += `
                    <div style="margin-bottom: 16px;">
                        <label class="input-label">${loan.label} (${(loan.rate * 100).toFixed(1)}%)</label>
                        <input type="number" class="input-field" id="balance-${loan.id}" value="${balance}" min="0">
                    </div>
                `;
            });

            html += `
                </div>

                <div class="card">
                    <label class="input-label">莽漏聧莽芦聥莽聸庐忙篓聶茅聡聭茅隆聧</label>
                    <input type="number" class="input-field" id="savingsGoal" value="${state.settings.savingsGoal}" min="0">
                </div>

                <div class="card">
                    <button class="button button-primary" onclick="saveSettings()">盲驴聺氓颅聵茫聛聶茫聜聥</button>
                </div>

                <div class="card">
                    <div class="input-label">茫聝聡茫聝录茫聜驴莽庐隆莽聬聠</div>
                    <button class="button button-secondary button-small" onclick="exportData()" style="width: 100%; margin-bottom: 8px;">茫聜篓茫聜炉茫聜鹿茫聝聺茫聝录茫聝聢</button>
                    <button class="button button-secondary button-small" onclick="document.getElementById('importFile').click()" style="width: 100%; margin-bottom: 8px;">茫聜陇茫聝鲁茫聝聺茫聝录茫聝聢</button>
                    <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importData()">
                    <button class="button button-danger button-small" onclick="resetData()" style="width: 100%;">茫聛聶茫聛鹿茫聛娄茫聝陋茫聜禄茫聝聝茫聝聢</button>
                </div>
            `;

            document.getElementById('settingsContent').innerHTML = html;
        }

        function saveSettings() {
            LOANS.forEach(loan => {
                const val = document.getElementById(`balance-${loan.id}`).value;
                state.balances[loan.id] = val || '0';
            });
            state.settings.savingsGoal = parseInt(document.getElementById('savingsGoal').value) || 0;
            saveState();
            showToast('猫篓颅氓庐職茫聜聮盲驴聺氓颅聵茫聛聴茫聛戮茫聛聴茫聛聼', 'success');
        }

        function exportData() {
            const dataStr = JSON.stringify(state, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `debt_dashboard_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('茫聜篓茫聜炉茫聜鹿茫聝聺茫聝录茫聝聢茫聛聴茫聛戮茫聛聴茫聛聼', 'success');
        }

        function importData() {
            const file = document.getElementById('importFile').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.entries && imported.balances && imported.settings) {
                        state = imported;
                        saveState();
                        showToast('茫聜陇茫聝鲁茫聝聺茫聝录茫聝聢茫聛聴茫聛戮茫聛聴茫聛聼', 'success');
                        renderSettingsTab();
                    } else {
                        showToast('氓陆垄氓录聫茫聛聦忙颅拢茫聛聴茫聛聫茫聛聜茫聜聤茫聛戮茫聛聸茫聜聯', 'error');
                    }
                } catch (err) {
                    showToast('茫聝聲茫聜隆茫聜陇茫聝芦茫聛庐猫陋颅茫聛驴猫戮录茫聛驴茫聛芦氓陇卤忙聲聴茫聛聴茫聛戮茫聛聴茫聛聼', 'error');
                }
            };
            reader.readAsText(file);
        }

        function resetData() {
            if (confirm('茫聛聶茫聛鹿茫聛娄茫聛庐茫聝聡茫聝录茫聜驴茫聜聮氓聣聤茅聶陇茫聛聴茫聛戮茫聛聶茫聙聜忙聹卢氓陆聯茫聛芦茫聜聢茫聜聧茫聛聴茫聛聞茫聛搂茫聛聶茫聛聥茂录聼')) {
                state = {
                    entries: [],
                    balances: { rakuten: '0', smbc: '0', other: '0' },
                    settings: { savingsGoal: 500000 },
                    steps: { history: [], streak: 0, lastEntryDate: null }
                };
                localStorage.removeItem(STORAGE_KEY);
                saveState();
                showToast('茫聝陋茫聜禄茫聝聝茫聝聢茫聛聴茫聛戮茫聛聴茫聛聼', 'success');
                renderSettingsTab();
            }
        }

        function init() {
            loadState();

            const currentDebt = getCurrentDebt();
            if (currentDebt === 0 && state.entries.length === 0) {
                const setupHtml = `
                    <div class="setup-screen">
                        <h1>Re:Start</h1>
                        <p>氓聙聼茅聡聭猫驴聰忙赂聢莽庐隆莽聬聠茫聜垄茫聝聴茫聝陋茫聛赂茫聜聢茫聛聠茫聛聯茫聛聺</p>
                        <p>茫聛戮茫聛職茫聛炉猫篓颅氓庐職茫聜驴茫聝聳茫聛搂茫聝颅茫聝录茫聝鲁忙庐聥茅芦聵茫聜聮氓聟楼氓聤聸茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞</p>
                        <button class="button button-primary" onclick="switchTab(4)">猫篓颅氓庐職茫聛芦茅聙虏茫聜聙 芒聠聮</button>
                    </div>
                `;
                document.querySelector('.content-area').innerHTML = setupHtml;
                return;
            }

            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabIndex = parseInt(btn.dataset.tab);
                    switchTab(tabIndex);
                });
            });

            updateHeaderStreak();
            renderTab(0);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
