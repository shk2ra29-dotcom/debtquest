        function calculateStreak() {
            if (!state.steps.history || state.steps.history.length === 0) return 0;
            let streak = 0;
            const today = new Date();
            for (let i = 0; i < 365; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                const found = state.steps.history.find(h => h.date === dateStr);
                if (!found) break;
                streak++;
            }
            return streak;
        }

        function calculateSteps() {
            const stepsInput = document.getElementById('stepsInput');
            const steps = parseInt(stepsInput.value) || 0;
            if (steps <= 0) {
                showToast('歩数を入力してください', 'error');
                return;
            }

            const total = Math.round(steps * 0.1);
            let debt, save, tier;

            if (steps < 8000) {
                debt = total;
                save = 0;
                tier = '初級';
            } else if (steps < 10000) {
                debt = Math.round(total * 0.7);
                save = total - debt;
                tier = '中級';
            } else {
                debt = Math.round(total * 0.5);
                save = total - debt;
                tier = '上級';
            }

            let html = `
                <div class="card">
                    <div class="step-result">
                        <div class="step-result-title">${tier}🎯 ${steps}歩</div>
                        <div class="step-result-amount">${formatNumber(total)}円</div>

                            </div>

                </div>
            `;

        function completeQuest(steps, total, debt, save) {
            const today = getTodayDate();
            const now = new Date().toISOString();

            const repayId = Date.now();
            state.entries.push({
                id: repayId,
                date: now,
                amount: debt,
                memo: `歩数: ${steps}歩 返済`,
                type: 'repay',
                loanId: 'smbc',
                source: 'steps'
            });

            if (save > 0) {
                const investId = Date.now() + 1;
                state.entries.push({
                    id: investId,
                    date: now,
                    amount: save,
                    memo: `歩数: ${steps}歩 積立`,
                    type: 'invest',
                    loanId: '',
                    source: 'steps'
                });
            }

            const existing = state.steps.history.find(h => h.date === today);
            if (existing) {
                existing.steps = steps;
                existing.total = total;
                existing.debt = debt;
                existing.save = save;
            } else {
                state.steps.history.push({
                    date: today,
                    steps,
                    total,
                    debt,
                    save
                });
            }

            state.steps.lastEntryDate = today;
            saveState();
            updateStreak();
            showToast('クエスト完了！💪', 'success');

            const card = event.target.closest('.card');
            if (card) card.classList.add('flash');
            setTimeout(() => {
                renderStepsTab();
            }, 600);
        }

        function recordEntry() {
            const amount = parseInt(document.getElementById('amountInput').value);
            const memo = document.getElementById('memoInput').value.trim();
            const loanId = recordType === 'repay' ? document.getElementById('loanSelect').value : '';

            if (!amount || amount <= 0) {

                return;
            }

            if (recordType === 'repay' && !loanId) {
                showToast('ローンを選択してください', 'error');
                return;

            const entry = {

                memo: memo || (recordType === 'repay' ? `${LOANS.find(l => l.id === loanId)?.label}へ返済` : '積立'),
                type: recordType,
                loanId: loanId || '',
                source: 'manual'

            state.entries.push(entry);
            saveState();
            showToast('記録しました！', 'success');

            document.getElementById('amountInput').value = '';
            document.getElementById('memoInput').value = '';
            document.getElementById('loanSelect').value = '';

            return `<path d="${path}" stroke="#A78BFA" stroke-width="2" fill="none" stroke-dasharray="4,4"/>`;

            if (sortedEntries.length > 0) {
                let repaidTotal = 0;
                const uniqueDates = [...new Set(sortedEntries.map(e => e.date.split('T')[0]))];

                uniqueDates.forEach((date, idx) => {
                    const dayRepaid = sortedEntries
                        .filter(e => e.date.startsWith(date))
                        .reduce((sum, e) => sum + e.amount, 0);
                    repaidTotal += dayRepaid;

                    const remaining = INITIAL_DEBT - repaidTotal;
                    const x = 30 + ((idx + 1) / Math.max(uniqueDates.length, 1)) * 360;
                    const y = 170 - Math.max(0, remaining / 6000000) * 160;
                    points.push([x, y]);
                });
            }

            let path = `M ${points[0][0]} ${points[0][1]}`;
            for (let i = 1; i < points.length; i++) {
                path += ` L ${points[i][0]} ${points[i][1]}`;
            }
            return `<path d="${path}" stroke="#00D4AA" stroke-width="2" fill="none"/>`;
        }

        function renderSavingsChart() {
            const invested = getTotalInvested();
            const goal = state.settings.savingsGoal;
            const percent = Math.min(100, (invested / goal) * 100);
            const barWidth = 30;
            const barHeight = percent * 0.8;

            return `
                <rect x="50" y="${100 - barHeight}" width="${barWidth}" height="${barHeight}" fill="#00D4AA" rx="2"/>
                <text x="${50 + barWidth / 2}" y="110" font-size="10" fill="#6B7280" text-anchor="middle">${Math.round(percent)}%</text>
                <text x="${50 + barWidth / 2}" y="20" font-size="9" fill="#6B7280" text-anchor="middle">${formatNumber(invested)}円</text>
            `;
        }

        function renderSettingsTab() {
            let html = `
                <div class="card">
                    <div class="input-label">ローン残高設定</div>
            `;

            LOANS.forEach(loan => {
                const balance = state.balances[loan.id] || '0';
                html += `
                    <div style="margin-bottom: 16px;">
                        <label class="input-label">${loan.label} (${(loan.rate * 100).toFixed(1)}%)</label>
                        <input type="number" class="input-field" id="balance-${loan.id}" value="${balance}" min="0">
                    </div>
                `;
            });

            html += `
                </div>

                <div class="card">
                    <label class="input-label">積立目標金額</label>
                    <input type="number" class="input-field" id="savingsGoal" value="${state.settings.savingsGoal}" min="0">
                </div>

                <div class="card">
                    <button class="button button-primary" onclick="saveSettings()">保存する</button>
                </div>

                <div class="card">
                    <div class="input-label">データ管理</div>
                    <button class="button button-secondary button-small" onclick="exportData()" style="width: 100%; margin-bottom: 8px;">エクスポート</button>
                    <button class="button button-secondary button-small" onclick="document.getElementById('importFile').click()" style="width: 100%; margin-bottom: 8px;">インポート</button>
                    <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importData()">
                    <button class="button button-danger button-small" onclick="resetData()" style="width: 100%;">すべてリセット</button>
                </div>
            `;

            document.getElementById('settingsContent').innerHTML = html;
        }

        function saveSettings() {
            LOANS.forEach(loan => {
                const val = document.getElementById(`balance-${loan.id}`).value;
                state.balances[loan.id] = val || '0';
            });
            state.settings.savingsGoal = parseInt(document.getElementById('savingsGoal').value) || 0;
            saveState();
            showToast('設定を保存しました', 'success');
        }

        function exportData() {
            const dataStr = JSON.stringify(state, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `debt_dashboard_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('エクスポートしました', 'success');
        }

        function importData() {
            const file = document.getElementById('importFile').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.entries && imported.balances && imported.settings) {
                        state = imported;
                        saveState();
                        showToast('インポートしました', 'success');
                        renderSettingsTab();
                    } else {
                        showToast('形式が正しくありません', 'error');
                    }
                } catch (err) {
                    showToast('ファイルの読み込みに失敗しました', 'error');
                }
            };
            reader.readAsText(file);
        }

        function resetData() {
            if (confirm('すべてのデータを削除します。本当によろしいですか？')) {
                state = {
                    entries: [],
                    balances: { rakuten: '0', smbc: '0', other: '0' },
                    settings: { savingsGoal: 500000 },
                    steps: { history: [], streak: 0, lastEntryDate: null }
                };
                localStorage.removeItem(STORAGE_KEY);
                saveState();
                showToast('リセットしました', 'success');
                renderSettingsTab();
            }
        }

        function init() {
            loadState();

            const currentDebt = getCurrentDebt();
            if (currentDebt === 0 && state.entries.length === 0) {
                const setupHtml = `
                    <div class="setup-screen">
                        <h1>Re:Start</h1>
                        <p>借金返済管理アプリへようこそ</p>
                        <p>まずは設定タブでローン残高を入力してください</p>
                        <button class="button button-primary" onclick="switchTab(4)">設定に進む →</button>
                    </div>
                `;
                document.querySelector('.content-area').innerHTML = setupHtml;
                return;
            }

            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabIndex = parseInt(btn.dataset.tab);
                    switchTab(tabIndex);
                });
            });

            updateHeaderStreak();
            renderTab(0);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
